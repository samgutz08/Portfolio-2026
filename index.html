<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/Portfolio.css">
    <!-- link to flavicon -->
    <link rel="icon" type="image/svg+ml" href="Flavicon.svg">
    <title>Sam Gutzmirtl's Portfolio</title>

</head>
<body>
    <div id="main-container">
    <!-- top boxes -->
        <div id="three-top-boxes">
               <img src="top-bar.svg" alt="top-bar" width="1024px">
        </div>
    <!-- logo and name lettering -->
        <div id="main-logoandname">
            <img src="logo+Name.svg" alt="logoandname">
        </div>
    <!-- top 3 navs -->
        <div id="first-navigation">
            <nav id="experience-button">
                <a href="#experience-top-layer-id" class="button">
                    <img src="experience.svg" alt="Click to go to experience">
                </a>
            </nav>
            <nav id="school-button">
                    <img src="school.svg" alt="school-button">
            </nav>  
            <nav id="sports-button">
                <img src="sports.svg" alt="sports">
            </nav>
        </div>
    <!-- Experience level nav-->
        <div id="experience-top-layer-id">
                <img src="experience-top-layer.svg" alt="experience-top-layer">
        </div>
    <!-- nav on the top of experience -->
        <div id="home-button">
            <a href="#three-top-boxes" class="button">
                <img src="home-button.svg" alt="homebutton-experience-level">
            </a>
        </div>
        <div id="school-button-LEVEL-experience">
            <img src="school-button-experience-level.svg" alt="schoolbutton-experience-level">
        </div>
        <div id="sports-button-LEVEL-experience">
            <img src="sports-button-experience-level.svg" alt="sportsbutton-experience-level">
        </div>
    <!-- big blue experience level -->
        <div class="hexagon">
            <!-- info of experience level -->
            <p id="first-ptag" class="Not-bold" style="font-family: Arial, Helvetica, sans-serif; ">
                My experience is mostly in...
            </p>
            <p id="software-Ptag" class="Bold">
                Sofware Skills
            </p>
        </div>
    
    


    





    </div>
</body>
</html>
